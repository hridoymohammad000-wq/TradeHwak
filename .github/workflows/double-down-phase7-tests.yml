name: Double Down Challenge Phase 7 Tests

on:
  push:
    branches:
      - feature/double-down-challenge-phase-7
    paths:
      - "artifacts/api-server/app/double_down/**"
      - "artifacts/api-server/tests/test_double_down_phase7.py"
      - ".github/workflows/double-down-phase7-tests.yml"
  pull_request:
    paths:
      - "artifacts/api-server/app/double_down/**"
      - "artifacts/api-server/tests/test_double_down_phase7.py"
      - ".github/workflows/double-down-phase7-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  phase7-simulation-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/api-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: artifacts/api-server/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Phase 7 tests
        run: python -m unittest -v tests.test_double_down_phase7
