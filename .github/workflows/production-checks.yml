name: Production Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package.json
      - name: Install frontend dependencies
        run: npm install
      - name: Type check
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm run lint > frontend-typecheck.log 2>&1
          status=$?
          cat frontend-typecheck.log
          echo "$status" > frontend-typecheck-status.txt
          exit $status
      - name: Upload type-check log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-typecheck-log
          path: |
            frontend-typecheck.log
            frontend-typecheck-status.txt
      - name: Enforce type-check result
        if: steps.typecheck.outcome != 'success'
        run: exit 1
      - name: Build frontend
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/api-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        run: pip install -r requirements.txt
      - name: Run backend tests
        run: python -m unittest discover -s tests
