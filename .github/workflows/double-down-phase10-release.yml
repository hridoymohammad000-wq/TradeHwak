name: Double Down Challenge Phase 10 Release Gate

on:
  push:
    branches:
      - integration/double-down-release
  pull_request:
    paths:
      - "artifacts/api-server/app/double_down/**"
      - "artifacts/api-server/app/api/routes/challenge.py"
      - "artifacts/api-server/app/api/router.py"
      - "artifacts/api-server/app/core/state.py"
      - "artifacts/api-server/migrations/001_init.sql"
      - "artifacts/api-server/tests/**"
      - "src/pages/DoubleDownChallenge.tsx"
      - "docs/DOUBLE_DOWN_RELEASE_CHECKLIST.md"
      - ".github/workflows/double-down-phase10-release.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: artifacts/api-server/requirements.txt
      - name: Install backend dependencies
        run: pip install -r artifacts/api-server/requirements.txt
      - name: Compile backend
        working-directory: artifacts/api-server
        run: python -m compileall -q app
      - name: Run all backend tests
        id: backend_tests
        continue-on-error: true
        working-directory: artifacts/api-server
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -p "test_*.py" -v > backend-test.log 2>&1
          status=$?
          echo "$status" > backend-test-status.txt
          tail -n 120 backend-test.log
          exit $status
      - name: Upload backend test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase10-backend-test-log
          path: |
            artifacts/api-server/backend-test.log
            artifacts/api-server/backend-test-status.txt
      - name: Enforce backend test result
        if: steps.backend_tests.outcome != 'success'
        run: exit 1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install pinned npm
        run: npm install --global npm@10.8.2 --no-audit --no-fund
      - name: Install frontend dependencies
        shell: bash
        run: |
          npm ci --no-audit --no-fund || \
          npm install --no-audit --no-fund
      - name: Build frontend
        run: npm run build
