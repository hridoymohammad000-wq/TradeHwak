name: Double Down Challenge Phase 1 Tests

on:
  push:
    branches:
      - feature/double-down-challenge-phase-1
    paths:
      - "artifacts/api-server/app/double_down/**"
      - "artifacts/api-server/tests/test_double_down_phase1.py"
      - "artifacts/api-server/requirements.txt"
      - ".github/workflows/double-down-phase1-tests.yml"
  pull_request:
    branches:
      - main
    paths:
      - "artifacts/api-server/app/double_down/**"
      - "artifacts/api-server/tests/test_double_down_phase1.py"
      - "artifacts/api-server/requirements.txt"
      - ".github/workflows/double-down-phase1-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  phase1-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/api-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: artifacts/api-server/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run Double Down Phase 1 tests
        run: python -m unittest -v tests.test_double_down_phase1
