name: Backend Contract Tests

on:
  push:
    branches: [main]
    paths:
      - "artifacts/api-server/**"
      - ".github/workflows/backend-contract-tests.yml"
  pull_request:
    paths:
      - "artifacts/api-server/**"
      - ".github/workflows/backend-contract-tests.yml"

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/api-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: artifacts/api-server/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run managed workflow contracts
        run: python -m unittest discover -s tests -p "test_*.py" -v
