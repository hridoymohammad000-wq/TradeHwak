services:
  - type: web
    name: tradehawk-api
    runtime: python
    rootDir: artifacts/api-server
    buildCommand: cd ../.. && VITE_API_BASE_URL= npm install && npm run build && cd artifacts/api-server && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: TRADEHAWK_ACCESS_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DEFAULT_SYSTEM_MODE
        value: demo
      - key: DEFAULT_STRATEGY_MODE
        value: intraday
      - key: BYBIT_ENV
        value: demo
      - key: BYBIT_BASE_URL
        value: https://api-demo.bybit.com
      - key: BYBIT_DEMO_API_KEY
        sync: false
